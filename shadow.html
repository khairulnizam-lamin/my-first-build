<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shadow — KNL Design System</title>
  <script>
    // Set theme before first paint to avoid a flash; full control in nav.js.
    document.documentElement.setAttribute('data-theme',
      localStorage.getItem('ds-theme') ||
      (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'));
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="base.css" />
  <style>
    /* Row: name | description | token | example shape */
    .col-desc { font-size: var(--text-xs); color: hsl(var(--muted-foreground)); flex: 1; }

    .col-shape {
      width: 200px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .shape-input, .shape-button, .shape-card, .shape-dialog { width: 200px; }

    /* Inset — input */
    .shape-input {
      height: 36px;
      border-radius: var(--radius-base);
      background: hsl(var(--muted));
      box-shadow: var(--shadow-inset);
      display: flex;
      align-items: center;
      padding: 0 var(--space-4);
    }
    .shape-input-cursor {
      width: 1px; height: 14px;
      background: hsl(var(--muted-foreground));
      animation: blink 1.1s step-end infinite;
      flex-shrink: 0;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .shape-input-placeholder { font-size: var(--type-body-sm-size); color: hsl(var(--muted-foreground)); }

    /* Ring — button */
    .shape-button {
      height: 36px;
      border-radius: var(--radius-button);
      background: hsl(var(--card));
      box-shadow: var(--shadow-ring);
      border: none;
      font-family: var(--font-sans);
      font-size: var(--type-label-md-size);
      font-weight: var(--font-medium);
      color: hsl(var(--foreground));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Raised — card */
    .shape-card {
      height: 80px;
      border-radius: var(--radius-base);
      background: hsl(var(--card));
      box-shadow: var(--shadow-raised);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 var(--space-5);
      gap: var(--space-2);
    }

    /* Overlay — dialog */
    .shape-dialog {
      height: 120px;
      border-radius: var(--radius-base);
      background: hsl(var(--card));
      box-shadow: var(--shadow-overlay);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 var(--space-6);
      gap: var(--space-3);
    }

    /* Skeleton lines inside card + dialog */
    .shape-line { height: 5px; border-radius: var(--radius-full); background: hsl(var(--muted)); }
  </style>
</head>
<body>

  <h1 class="page-heading">Shadow</h1>

  <div class="row">
    <div class="name">Inset</div>
    <div class="col-desc">Inputs, pressed states</div>
    <div class="token">--shadow-inset</div>
    <div class="col-shape">
      <div class="shape-input">
        <div class="shape-input-cursor"></div>
        <span class="shape-input-placeholder">Placeholder text</span>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="name">Ring</div>
    <div class="col-desc">Buttons, interactive elements</div>
    <div class="token">--shadow-ring</div>
    <div class="col-shape">
      <button class="shape-button">Continue</button>
    </div>
  </div>
  <div class="row">
    <div class="name">Raised</div>
    <div class="col-desc">Cards, dropdowns, slight lift</div>
    <div class="token">--shadow-raised</div>
    <div class="col-shape">
      <div class="shape-card">
        <div class="shape-line" style="width: 40%;"></div>
        <div class="shape-line" style="width: 80%;"></div>
        <div class="shape-line" style="width: 60%;"></div>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="name">Overlay</div>
    <div class="col-desc">Modals, popovers</div>
    <div class="token">--shadow-overlay</div>
    <div class="col-shape">
      <div class="shape-dialog">
        <div class="shape-line" style="width: 50%;"></div>
        <div class="shape-line" style="width: 90%;"></div>
        <div class="shape-line" style="width: 70%;"></div>
      </div>
    </div>
  </div>

  <script src="nav.js"></script>
</body>
</html>
