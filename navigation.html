<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navigation — KNL Design System</title>
  <script>
    document.documentElement.setAttribute('data-theme',
      localStorage.getItem('ds-theme') ||
      (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'));
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="components.css" />
</head>
<body>

  <h1 class="page-heading">Navigation</h1>

  <div class="section">
    <div class="section-label">Tabs</div>
    <div style="max-width: 520px;">
      <div class="tabs-list">
        <button class="tab-trigger active" data-tab="t1" data-tab-name="account">Account</button>
        <button class="tab-trigger" data-tab="t1" data-tab-name="password">Password</button>
        <button class="tab-trigger" data-tab="t1" data-tab-name="team">Team</button>
      </div>
      <div class="tab-panel active" data-panel="t1:account">
        <div class="card-body">Manage your account details and preferences here.</div>
      </div>
      <div class="tab-panel" data-panel="t1:password">
        <div class="card-body">Update your password and security settings here.</div>
      </div>
      <div class="tab-panel" data-panel="t1:team">
        <div class="card-body">Invite teammates and manage their roles here.</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Breadcrumb</div>
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="#">Home</a>
      <span class="sep">/</span>
      <a href="#">Design system</a>
      <span class="sep">/</span>
      <span class="current">Navigation</span>
    </nav>
  </div>

  <div class="section">
    <div class="section-label">Pagination</div>
    <nav class="pagination" aria-label="Pagination">
      <button class="page-btn" aria-label="Previous">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button class="page-btn active">1</button>
      <button class="page-btn">2</button>
      <button class="page-btn">3</button>
      <button class="page-btn">4</button>
      <button class="page-btn" aria-label="Next">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </nav>
  </div>

  <div class="section">
    <div class="section-label">Dropdown menu</div>
    <div class="popover-wrap">
      <button class="btn btn-outline" data-dropdown="demo-menu">
        Options
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="menu" id="demo-menu" style="position:absolute; top:calc(100% + var(--space-2)); left:0; z-index:250;">
        <button class="menu-item">Edit</button>
        <button class="menu-item">Duplicate</button>
        <button class="menu-item">Share</button>
        <div class="menu-separator"></div>
        <button class="menu-item" style="color: hsl(var(--destructive));">Delete</button>
      </div>
    </div>
  </div>

  <script src="components.js"></script>
  <script src="nav.js"></script>
</body>
</html>
